[plugins."Application Launcher"]
execute = "runapp -- gtk-launch {id}"

[plugins."Calculator"]
execute = "wl-copy -- {data}"

[plugins."Commands"]
execute = "{data}"

[[plugins."Commands".commands]]
pattern = "^todo\\s*(.*)"
command = "Q='$1'; zk list --format jsonl --quiet -m \"TODO/${Q:-*}\" --notebook-dir ~/Notes | jq -c '{id: .absPath, title: .title, description: .lead, data: .absPath}'"
modifiers = { data = "xdg-open {data}" }
